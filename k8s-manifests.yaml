# 1. 백엔드 디플로이먼트 (Spring Boot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
  labels:
    app: bookapp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookapp-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
        - name: backend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<BACK_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: db-volume
              mountPath: /app/db
      volumes:
        - name: db-volume
          emptyDir: {}
---
# 2. 백엔드 서비스 (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-backend-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: bookapp-backend
---
# 3. 프론트엔드 디플로이먼트 (React + Nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-frontend
  labels:
    app: bookapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookapp-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: bookapp-frontend
    spec:
      containers:
        - name: frontend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<FRONT_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
# 4. 프론트엔드 서비스 (LoadBalancer)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-frontend-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: bookapp-frontend