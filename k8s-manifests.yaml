# 1. 백엔드 디플로이먼트 (Spring Boot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
  labels:
    app: bookapp-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bookapp-backend
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
        - name: backend
          image: 416225317325.dkr.ecr.us-east-1.amazonaws.com/user30-back-repo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/books
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: db-volume
              mountPath: /app/db
      volumes:
        - name: db-volume
          emptyDir: {}
---
# 2. 백엔드 서비스
apiVersion: v1
kind: Service
metadata:
  name: bookapp-backend-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: bookapp-backend
---
# 3. 프론트엔드 디플로이먼트
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-frontend
  labels:
    app: bookapp-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bookapp-frontend
  template:
    metadata:
      labels:
        app: bookapp-frontend
    spec:
      containers:
        - name: frontend
          image: 416225317325.dkr.ecr.us-east-1.amazonaws.com/user30-front-repo:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
# 4. 프론트엔드 서비스
apiVersion: v1
kind: Service
metadata:
  name: bookapp-frontend-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "arn:aws:acm:us-east-1:416225317325:certificate/b5e14261-a8e5-41b0-b995-e919aa0df1b7"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "https"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 80
  selector:
    app: bookapp-frontend