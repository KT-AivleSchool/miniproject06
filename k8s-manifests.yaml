apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: h2-db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 1. 백엔드 디플로이먼트 (Spring Boot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
  labels:
    app: bookapp-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookapp-backend
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
        - name: backend
          # 이미지 경로는 ECR 업로드에 맞게 수정하십시오.
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<BACK_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: db-volume
              # H2 파일 DB가 생성되는 경로인 /app/db를 영구 볼륨에 바인딩
              mountPath: /app/db
      volumes:
        - name: db-volume
          persistentVolumeClaim:
            claimName: h2-db-pvc
---
# 2. 백엔드 서비스 (ClusterIP - k8s 내부망 노출)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-backend-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: bookapp-backend
---
# 3. 프론트엔드 디플로이먼트 (React + Nginx 프록시)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-frontend
  labels:
    app: bookapp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookapp-frontend
  template:
    metadata:
      labels:
        app: bookapp-frontend
    spec:
      containers:
        - name: frontend
          # 이미지 경로는 ECR 업로드에 맞게 수정하십시오.
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<FRONT_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 80
---
# 4. 프론트엔드 서비스 (LoadBalancer - 외부 서비스 노출)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-frontend-service
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: bookapp-frontend
