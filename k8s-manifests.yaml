# 1. 백엔드 디플로이먼트 (Spring Boot)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-backend
  labels:
    app: bookapp-backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bookapp-backend
  template:
    metadata:
      labels:
        app: bookapp-backend
    spec:
      containers:
        - name: backend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<BACK_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/books
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: db-volume
              mountPath: /app/db
      volumes:
        - name: db-volume
          emptyDir: {}
---
# 2. 백엔드 서비스 (ClusterIP - 내부 통신망)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-backend-service
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: bookapp-backend
---
# 3. 프론트엔드 디플로이먼트 (React + Nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookapp-frontend
  labels:
    app: bookapp-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: bookapp-frontend
  template:
    metadata:
      labels:
        app: bookapp-frontend
    spec:
      containers:
        - name: frontend
          image: <AWS_ACCOUNT_ID>.dkr.ecr.<AWS_DEFAULT_REGION>.amazonaws.com/<FRONT_IMAGE_REPO_NAME>:latest
          ports:
            - containerPort: 80
---
# 4. 프론트엔드 서비스 (NodePort - Ingress(ALB) 연동용으로 변경)
apiVersion: v1
kind: Service
metadata:
  name: bookapp-frontend-service
spec:
  type: NodePort # 👈 ALB 타겟그룹 연동을 위해 NodePort로 변경 (pending 방지)
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: bookapp-frontend
---
# 5. 인그레스 설정 (AWS ALB 생성 및 SSL/도메인 매핑)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chan-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    # 💡 alb 로드밸런서가 파드 IP로 직접 통신하도록 유도 (추천 설정)
    alb.ingress.kubernetes.io/target-type: ip
    # 🔒 발급 완료된 ACM 인증서 매핑
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:416225317325:certificate/a140fb47-7d1a-4c87-9e01-7243bfb899b0
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # HTTP 요청을 HTTPS로 강제 리다이렉트
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
    - host: aivle-22.p-e.kr  # 👈 나의 도메인 주소
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bookapp-frontend-service  # 👈 4번 서비스 이름과 정확히 일치시킴
                port:
                  number: 80