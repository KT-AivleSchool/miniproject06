version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      # AWS 계정 ID($AWS_ACCOUNT_ID)와 리전($AWS_DEFAULT_REGION) 환경변수를 바탕으로 ECR 인증을 획득합니다.
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      # ECR 이미지 업로드를 위한 URI 경로를 변수로 정의합니다.
      - REPOSITORY_URI_FRONT=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$FRONT_IMAGE_REPO_NAME
      - REPOSITORY_URI_BACK=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$BACK_IMAGE_REPO_NAME
      # 이미지 태그로 사용할 Git 커밋 해시값을 추출합니다.
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Building the Docker image..."
      # Frontend Docker 이미지를 빌드합니다.
      - docker build -t $REPOSITORY_URI_FRONT:latest ./frontend
      - docker tag $REPOSITORY_URI_FRONT:latest $REPOSITORY_URI_FRONT:$IMAGE_TAG
      # Backend Docker 이미지를 빌드합니다.
      - docker build -t $REPOSITORY_URI_BACK:latest ./bookapp/bookapp
      - docker tag $REPOSITORY_URI_BACK:latest $REPOSITORY_URI_BACK:$IMAGE_TAG
  post_build:
    commands:
      - echo "Build completed on `date`"
      - echo "Pushing the Docker images to ECR..."
      # 빌드된 이미지를 ECR에 업로드합니다.
      - docker push $REPOSITORY_URI_FRONT:latest
      - docker push $REPOSITORY_URI_FRONT:$IMAGE_TAG
      - docker push $REPOSITORY_URI_BACK:latest
      - docker push $REPOSITORY_URI_BACK:$IMAGE_TAG
      # k8s-manifests.yaml의 이미지 플레이스홀더를 실제 ECR URI로 치환합니다.
      - sed -i "s|FRONT_IMAGE_URI|$REPOSITORY_URI_FRONT:$IMAGE_TAG|g" k8s-manifests.yaml
      - sed -i "s|BACK_IMAGE_URI|$REPOSITORY_URI_BACK:$IMAGE_TAG|g" k8s-manifests.yaml
      - echo "Deploy stage will handle kubectl apply via Amazon EKS action"

artifacts:
  files:
    - k8s-manifests.yaml
