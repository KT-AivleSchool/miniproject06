version: 0.2

phases:
  install:
    commands:
      - echo "Installing kubectl..."
      # k8s(EKS) 배포를 위해 CodeBuild 환경에 kubectl CLI를 설치합니다.
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x ./kubectl
      - mv ./kubectl /usr/local/bin/kubectl
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws --version
      # AWS 계정 ID($AWS_ACCOUNT_ID)와 리전($AWS_DEFAULT_REGION) 환경변수를 바탕으로 ECR 인증을 획득합니다.
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      # ECR 이미지 업로드를 위한 URI 경로를 변수로 정의합니다.
      - REPOSITORY_URI_FRONT=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$FRONT_IMAGE_REPO_NAME
      - REPOSITORY_URI_BACK=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$BACK_IMAGE_REPO_NAME
      # 빌드 시 고유 태그로 사용할 Git 커밋 해시값을 추출합니다.
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Building the Frontend Docker image..."
      # frontend 디렉토리 안의 Dockerfile을 기반으로 React 앱을 빌드하고 Nginx가 내장된 이미지를 생성합니다.
      - docker build --no-cache -t $REPOSITORY_URI_FRONT:latest ./frontend
      - docker build -t $REPOSITORY_URI_FRONT:$IMAGE_TAG ./frontend
      - echo "Building the Backend Docker image..."
      # bookapp/bookapp 디렉토리 안의 Dockerfile을 기반으로 Gradle 빌드 및 Spring Boot 이미지를 생성합니다.
      - docker build -t $REPOSITORY_URI_BACK:latest ./bookapp/bookapp
      - docker build -t $REPOSITORY_URI_BACK:$IMAGE_TAG ./bookapp/bookapp
  post_build:
    commands:
      - echo "Build completed on `date`"
      - echo "Pushing the Docker images to ECR..."
      # 빌드된 최신(latest) 이미지와 버전 태그가 붙은 이미지를 AWS ECR로 업로드합니다.
      - docker push $REPOSITORY_URI_FRONT:latest
      - docker push $REPOSITORY_URI_FRONT:$IMAGE_TAG
      - docker push $REPOSITORY_URI_BACK:latest
      - docker push $REPOSITORY_URI_BACK:$IMAGE_TAG
      - echo "Writing image definitions..."
      # 배포 파이프라인에서 참조할 수 있는 이미지 경로 정의 파일을 아티팩트로 생성합니다.
      - printf '[{"name":"frontend","imageUri":"%s"},{"name":"backend","imageUri":"%s"}]' "$REPOSITORY_URI_FRONT:$IMAGE_TAG" "$REPOSITORY_URI_BACK:$IMAGE_TAG" > imagedefinitions.json

      - echo "Substituting image paths in k8s manifests..."
      # k8s-manifests.yaml에 적힌 이미지 latest 주소를 CodeBuild에서 생성한 커밋 태그 이미지로 치환합니다.
      - sed -i "s|416225317325.dkr.ecr.us-east-1.amazonaws.com/user30-back-repo:latest|${REPOSITORY_URI_BACK}:${IMAGE_TAG}|g" k8s-manifests.yaml
      - sed -i "s|416225317325.dkr.ecr.us-east-1.amazonaws.com/user30-front-repo:latest|${REPOSITORY_URI_FRONT}:${IMAGE_TAG}|g" k8s-manifests.yaml

      - echo "Deploying to Amazon EKS..."
      # CodeBuild 환경에서 kubectl을 이용해 EKS 클러스터에 배포 명령을 직접 전달합니다.
      # EKS_CLUSTER_NAME 및 AWS_DEFAULT_REGION 환경변수가 정의되어 있어야 합니다.
      - aws eks update-kubeconfig --region $AWS_DEFAULT_REGION --name $EKS_CLUSTER_NAME
      - kubectl apply -f k8s-manifests.yaml
      - kubectl apply -f hpa.yaml

artifacts:
  files:
    - imagedefinitions.json
    - k8s-manifests.yaml
    - hpa.yaml